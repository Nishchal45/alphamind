name: Feature request
description: Propose a new capability for AlphaMind
title: "feat: <short summary>"
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or engineering problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the shape of the change. Include API surface, module boundaries, or user-visible behaviour.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches were evaluated, and why were they rejected?

  - type: checkboxes
    id: adr
    attributes:
      label: Architectural impact
      options:
        - label: This change is non-trivial and will require an ADR.
        - label: This change is purely additive / cosmetic and does not require an ADR.

  - type: textarea
    id: notes
    attributes:
      label: Additional context
