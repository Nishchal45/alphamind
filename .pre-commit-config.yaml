default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Mypy runs against the project's actual virtualenv via uv so that type
  # stubs for runtime dependencies (sqlalchemy, pydantic, etc.) are picked up
  # automatically instead of needing to be mirrored in additional_dependencies.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (uv run)
        entry: uv run mypy --config-file=pyproject.toml
        language: system
        types_or: [python, pyi]
        pass_filenames: false
        args: [src, tests]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []
